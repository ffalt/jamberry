@if (lyrics(); as lyrics) {
	<div class="info">
		<div class="description">
			<div class="note">
				@for (note of lyrics; track $index) {
					<div>
						<div [innerHTML]="note"></div>
					</div>
				}
				@if (lyricsSource(); as lyricsSource) {
					<div class="info-footnote">
						<a i18n [href]="lyricsSource">Source</a>
					</div>
				}
			</div>
		</div>
	</div>
} @else {
	<app-loading />
}
