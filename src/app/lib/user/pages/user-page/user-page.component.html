<div class="user">
	<app-view-header-slim i18n-section section="User" />
	@let u = user();
	@if (u) {
		<div class="content">
			<div class="row">
				<div class="column first">
					<div i18n class="section-title">Avatar</div>
					<app-user-avatar />
				</div>
				<div class="column">
					<div class="section">
						<div i18n class="section-title">Name</div>
						<div>{{ u.name }}</div>
					</div>
					@if (u.roles) {
						<div class="section">
							<div i18n class="section-title">Permissions</div>
							<div class="roles">
								@if (u.roles.stream) {
									<div><app-icon-checkmark />
										<ng-container i18n>Stream Audio</ng-container>
									</div>
								}
								@if (u.roles.podcast) {
									<div><app-icon-checkmark />
										<ng-container i18n>Manage Podcasts</ng-container>
									</div>
								}
								@if (u.roles.upload) {
									<div><app-icon-checkmark />
										<ng-container i18n>Upload Audio</ng-container>
									</div>
								}
								@if (u.roles.admin) {
									<div><app-icon-checkmark />
										<ng-container i18n>Server Administration</ng-container>
									</div>
								}
							</div>
						</div>
					}
				</div>
			</div>
			<div class="section">
				<app-user-stats />
			</div>
		</div>
	}
</div>
