<div class="match-album-images">
	<label class="front-only-choice">
		<input (change)="onToggleShowFrontImagesOnly()" [(ngModel)]="showFrontImagesOnly" [checked]="showFrontImagesOnly" type="checkbox">
		<ng-container i18n>Front only</ng-container>
	</label>
	<div class="section">
		<a href="https://coverartarchive.org/" i18n rel="noopener" target="_blank">Coverart</a>
	</div>
	@if (isImageSearchRunning()) {
		<app-icon-spin class="icon-spin" />
	}
	@if (error()) {
		<div class="search-error">
			<span>{{ error() }}</span>
			<button class="button-on-control" (click)="retry()" i18n>Retry</button>
		</div>
	}
	@let list = images();
	@if (list && !isImageSearchRunning() && !error()) {
		<div class="match-images">
			<app-background-text-list name="Images" [list]="list" />
			<div class="media-cards">
				@for (node of list; track node.image.id) {
					<div class="media-card no-hover">
						@if (node.base64) {
							<div class="image">
								<app-image-base64 [image]="node.base64" />
							</div>
							<div class="footer">
								<div class="footer-content"><label><input type="checkbox" [checked]="node.checked"> {{ node.image.types }}</label></div>
							</div>
						}
					</div>
				}
			</div>
		</div>
	}
</div>
