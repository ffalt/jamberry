<context-menu #queueMenu>
	<ng-template contextMenuItem let-track="track">
		@if (track.faved) {
			<app-icon-heart-full />
			<ng-container i18n>Remove from Favorites</ng-container>
		} @else {
			<app-icon-heart-empty />
			<ng-container i18n>Add to Favorites</ng-container>
		}
	</ng-template>
	<ng-template contextMenuItem let-track="track">
		<app-context-entry-rate [base]="track" baseType="track" i18n-baseType />
	</ng-template>
	<ng-template (execute)="queue.remove(toTrack($event.item))" contextMenuItem><app-icon-list-add />
		<ng-container i18n>Remove From Queue</ng-container>
	</ng-template>
	<ng-template (execute)="actions.download(toTrack($event.item))" contextMenuItem><app-icon-download-cloud />
		<ng-container i18n>Download</ng-container>
	</ng-template>
	<ng-template (execute)="navig.toTrack(toTrack($event.item))" contextMenuItem><app-icon-track />
		<ng-container i18n>Show Track Details</ng-container>
	</ng-template>
</context-menu>
