@let list = entries();
@if (list.length === 0) {
	<app-background-text text="No Tracks in Queue" i18n-text />
} @else {
	<div class="title" i18n>Queue</div>
}
<div [settabindex]="list.length===0?'':'0'" appFocusKeyList class="tracks-wrapper" role="list">
	@if (list.length > 0) {
		<cdk-virtual-scroll-viewport style="height: 100%; width:100%;" [itemSize]="60">
			<div class="tracks" cdkDropList [cdkDropListData]="list" (cdkDropListDropped)="onDrop($event)">
				<div *cdkVirtualFor="let entry of list; let index = index;"
						 class="track-wrapper"
						 cdkDrag
						 appFocusKeyListItem role="listitem"
						 (dblclick)="doubleClickPlayQueuePos(index)"
						 (keydown.enter)="playQueuePos(index)"
						 (touchstart)="onTouchStart($event)"
						 (touchmove)="onTouchMove($event)"
						 (touchend)="onTouchEnd($event, entry)"
						 (touchcancel)="onTouchCancel()"
						 (contextmenu)="onContextMenu($event, entry)"
				>
					<app-queue-item [entry]="entry" [index]="index" />
				</div>
			</div>
		</cdk-virtual-scroll-viewport>
	}
</div>
@if (showControls()) {
	<div class="queue-actions" [class.disabled]="list.length===0">
		<button class="queue-action" title="Clear Queue" i18n-title (click)="queue.clear()"><app-icon-remove aria-hidden="true" />
			<ng-container i18n>Clear</ng-container>
		</button>
		<button class="queue-action" title="Randomize Order of Tracks" i18n-title (click)="queue.shuffle()"><app-icon-shuffle aria-hidden="true" />
			<ng-container i18n>Shuffle</ng-container>
		</button>
	</div>
}
