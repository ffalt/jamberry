<app-mini-time-slider [class.hidden]="tabService.playerTab.active()" />
<div class="buttons">
	<div>
		<button (click)="tabService.clickPlayer()" [class.active]="tabService.playerTab.active()" class="art">
			@if (player.currentMedia) {
				<div>
					<app-coverart-image alt="Album Art" i18n-alt [coverArtObj]="player.currentMedia" [size]="50" [fill]="true" />
				</div>
			} @else {
				<app-icon-info aria-hidden="true" />
			}
		</button>
	</div>
	<div class="actions">
		<button (click)="player.previous()" [disabled]="!queue.hasPrevious" i18n-title title="Previous Track"><app-icon-fast-backward aria-hidden="true" /></button>
		@if (player.isPlaying) {
			<button class="play" i18n-title title="Pause" (click)="togglePlayPause()"><app-icon-pause aria-hidden="true" /></button>
		} @else {
			<button class="play" i18n-title title="Play" (click)="togglePlayPause()"><app-icon-play aria-hidden="true" /></button>
		}
		<button (click)="player.next()" [disabled]="!queue.hasNext" i18n-title title="Next Track"><app-icon-fast-forward aria-hidden="true" /></button>
	</div>
	<div>
		<button (click)="tabService.clickQueue()" [class.active]="tabService.queueTab.active()"><app-icon-queue aria-hidden="true" /></button>
	</div>
</div>
