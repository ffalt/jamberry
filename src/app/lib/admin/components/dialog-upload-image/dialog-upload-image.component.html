@if (isIdle) {
	<div class="drop-zone" (drop)="onDropFile($event)" (dragover)="onDragOverFile($event)">
		<p class="drop-hint" i18n>Drop image here or</p>
		<label class="browse-btn" for="file-upload" i18n>Choose file</label>
		<input id="file-upload" type="file" accept=".png,.jpeg,.jpg,.webp" (change)="selectFile($event)">
	</div>
} @else {
	<div class="status">
		<div>
			@if (isUploading) {
				<ng-container i18n>Uploading</ng-container>
			} @else {
				<ng-container i18n>Creating Artwork</ng-container>
			}
		</div>
		<app-loading />
	</div>
}
