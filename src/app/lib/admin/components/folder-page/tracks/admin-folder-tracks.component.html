@if (!folder) {
	<app-loading />
}
<app-background-text-list [list]="$safeNavigationMigration(folder?.tracks)" name="Tracks" />
@if (folder && folder.tracks && folder.tracks.length > 0) {
	<div class="tracks">
		<div class="actions">
			<button class="button-on-control" title="Refresh" i18n-title (click)="refresh()"><app-icon-reload /></button>
			<button class="button-on-control" title="Move Tracks…" i18n-title (click)="moveTracks()"><app-icon-right-bold /></button>
			<button class="button-on-control" title="Delete Tracks…" i18n-title (click)="deleteTracks()"><app-icon-trash /></button>
		</div>
		<app-admin-track-list class="content" [tracks]="folder.tracks" />
	</div>
}
