<div class="roots">
	<app-view-header-slim i18n-section section="Roots">
		<div class="actions">
			<button (click)="refresh()" class="button-on-control" i18n-title title="Refresh"><app-icon-reload /></button>
			<button (click)="newRoot()" class="button-on-control" i18n-title title="New Root…"><app-icon-plus /></button>
			<button (click)="refreshRoots()" class="button-on-control" i18n-title title="Rescan all Roots"><app-icon-rescan /></button>
		</div>
	</app-view-header-slim>
	<div class="content">
		<app-admin-root-list [roots]="roots" />
	</div>
</div>
