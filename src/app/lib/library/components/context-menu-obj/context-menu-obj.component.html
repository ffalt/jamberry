<context-menu #objMenu>
	@if (showGoto) {
		<ng-template contextMenuItem (execute)="toLibraryObject($event.item).navigTo()"><app-icon-view-details />
			<ng-container i18n>Navigate to</ng-container>
		</ng-template>
	}
	<ng-template (execute)="toLibraryObject($event.item).play()" contextMenuItem><app-icon-play />
		<ng-container i18n>Play</ng-container>
	</ng-template>
	<ng-template (execute)="toLibraryObject($event.item).toggleFav()" contextMenuItem let-item="item">
		@if (item.base.faved) {
			<app-icon-heart-full />
			<ng-container i18n>Remove from Favorites</ng-container>
		} @else {
			<app-icon-heart-empty />
			<ng-container i18n>Add to Favorites</ng-container>
		}
	</ng-template>
	<ng-template contextMenuItem let-item="item">
		<app-context-entry-rate [baseType]="item.type" [base]="item.base" />
	</ng-template>
	<ng-template (execute)="toLibraryObject($event.item).addToPlaylist()" contextMenuItem><app-icon-playlist />
		<ng-container i18n>Add To Playlist</ng-container>
	</ng-template>
	<ng-template (execute)="toLibraryObject($event.item).addToQueue()" contextMenuItem><app-icon-list-add />
		<ng-container i18n>Add To Queue</ng-container>
	</ng-template>
	<ng-template (execute)="toLibraryObject($event.item).download()" contextMenuItem><app-icon-download-cloud />
		<ng-container i18n>Download</ng-container>
	</ng-template>
	@for (extra of extras; track extra) {
		<ng-template contextMenuItem (execute)="extra.click()"><ng-container [ngComponentOutlet]="extra.icon" /> {{ extra.text }}</ng-template>
	}
</context-menu>
