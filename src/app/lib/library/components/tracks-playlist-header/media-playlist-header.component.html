<div class="heading">
	<div class="handle"></div>
	<div class="fav" i18n-title title="Favorite Track"><app-icon-heart-empty /></div>
	@if (showRating()) {
		<div class="rating" title="Rating" i18n-title><app-icon-checkmark /></div>
	}
	@if (showPlayCount()) {
		<div class="play-count" title="Play Counter" i18n-title><app-icon-headphones /></div>
	}
	@if (showPlayDate()) {
		<div class="play-date" title="Last Played" i18n-title><app-icon-clock /></div>
	}
	<div class="number" i18n-title title="Track Number">#</div>
	<div class="title" i18n i18n-title title="Title">Track</div>
	<div class="length" i18n-title title="Duration"><app-icon-stopwatch /></div>
</div>
