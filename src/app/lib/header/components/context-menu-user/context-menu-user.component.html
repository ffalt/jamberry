<context-menu #userMenu>
	<ng-template (execute)="navig.toUser()" contextMenuItem><app-icon-user />
		<ng-container i18n>Profile</ng-container>
	</ng-template>
	<ng-template (execute)="navig.toUserSettings()" contextMenuItem><app-icon-settings />
		<ng-container i18n>Settings</ng-container>
	</ng-template>
	<ng-template (execute)="navig.toLibraryStart()" contextMenuItem><app-icon-browse />
		<ng-container i18n>Library</ng-container>
	</ng-template>
	<ng-template (execute)="navig.toAdmin()" [visible]="!!auth.user?.roles?.admin" contextMenuItem><app-icon-admin />
		<ng-container i18n>Administration</ng-container>
	</ng-template>
	<ng-template (execute)="navig.toAbout()" contextMenuItem><app-icon-help />
		<ng-container i18n>About</ng-container>
	</ng-template>
	<ng-template (execute)="navig.toLogout()" contextMenuItem><app-icon-logout />
		<ng-container i18n>Logout</ng-container>
	</ng-template>
</context-menu>
